<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Momento — Intro</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --terra: #C5793A;
    --terra-dark: #8b4a18;
    --bg: #080503;
    --cream: #fdf7f0;
  }

  body {
    background: var(--bg);
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Georgia', serif;
  }

  /* ─── INTRO STAGE ─── */
  #intro {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    transition: opacity 0.8s ease;
  }
  #intro.fade-out {
    opacity: 0;
    pointer-events: none;
  }

  .intro-word {
    display: flex;
    align-items: center;
    gap: 0;
    position: relative;
  }

  /* Each letter */
  .letter {
    display: inline-block;
    font-size: clamp(60px, 10vw, 120px);
    font-weight: 300;
    letter-spacing: 0.15em;
    color: #fff;
    line-height: 1;
    opacity: 0;
    transform: scaleY(0.05) translateY(0px);
    transform-origin: center;
    transition: none;
    text-transform: uppercase;
    position: relative;
  }

  /* The M — opens first like the Netflix N */
  .letter-m {
    color: var(--terra);
    font-weight: 500;
  }

  /* Sheen overlay per letter */
  .letter::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.6) 50%, transparent 60%);
    transform: translateX(-150%);
    pointer-events: none;
  }
  .letter.sheen::after {
    transform: translateX(150%);
    transition: transform 0.4s ease;
  }

  /* Line separator */
  .intro-line {
    position: absolute;
    bottom: -12px;
    left: 0;
    right: 0;
    height: 1.5px;
    background: linear-gradient(to right, transparent, var(--terra), transparent);
    transform: scaleX(0);
    transform-origin: center;
    transition: transform 0.6s cubic-bezier(0.34, 1.4, 0.64, 1);
  }
  .intro-line.show { transform: scaleX(1); }

  /* Dot at end */
  .dot {
    display: inline-block;
    color: var(--terra);
    opacity: 0;
    font-size: clamp(60px, 10vw, 120px);
    font-weight: 300;
    line-height: 1;
    transform: scale(0);
    transition: none;
  }

  /* ─── LANDING ─── */
  #landing {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    opacity: 0;
    pointer-events: none;
    transition: opacity 1s ease 0.3s;
  }
  #landing.visible {
    opacity: 1;
    pointer-events: auto;
  }

  /* Petal canvas behind */
  #petal-canvas {
    position: absolute;
    inset: 0;
    z-index: 0;
    opacity: 0;
    transition: opacity 2s ease 1s;
  }
  #landing.visible #petal-canvas { opacity: 1; }

  /* Logo top-left */
  .logo {
    position: absolute;
    top: 28px;
    left: 36px;
    font-size: 18px;
    font-weight: 400;
    color: #fff;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    z-index: 10;
    opacity: 0;
    transform: translateY(-8px);
    transition: opacity 0.6s ease 0.8s, transform 0.6s ease 0.8s;
  }
  .logo span { color: var(--terra); }
  #landing.visible .logo { opacity: 1; transform: translateY(0); }

  /* Hero content */
  .hero {
    position: relative;
    z-index: 10;
    text-align: center;
    max-width: 680px;
    padding: 0 24px;
  }
  .hero-eyebrow {
    font-size: 11px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(197,121,58,0.7);
    margin-bottom: 20px;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.7s ease 0.5s, transform 0.7s ease 0.5s;
  }
  #landing.visible .hero-eyebrow { opacity: 1; transform: translateY(0); }

  .hero-title {
    font-size: clamp(32px, 5vw, 56px);
    font-weight: 300;
    color: #fff;
    line-height: 1.3;
    letter-spacing: -0.01em;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.8s ease 0.65s, transform 0.8s ease 0.65s;
  }
  .hero-title em { color: var(--terra); font-style: normal; }
  #landing.visible .hero-title { opacity: 1; transform: translateY(0); }

  .hero-sub {
    margin-top: 14px;
    font-size: 16px;
    color: rgba(255,255,255,0.35);
    font-style: italic;
    opacity: 0;
    transition: opacity 0.7s ease 0.9s;
  }
  #landing.visible .hero-sub { opacity: 1; }

  /* Buttons */
  .btns {
    margin-top: 40px;
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.7s ease 1.1s, transform 0.7s ease 1.1s;
  }
  #landing.visible .btns { opacity: 1; transform: translateY(0); }

  .btn-primary {
    padding: 16px 36px;
    background: var(--terra);
    color: #fff;
    border: none;
    border-radius: 100px;
    font-size: 14px;
    font-family: 'Georgia', serif;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
    box-shadow: 0 8px 32px rgba(197,121,58,0.35);
    text-decoration: none;
    display: inline-block;
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 14px 40px rgba(197,121,58,0.5);
    background: #d4883f;
  }

  .btn-secondary {
    padding: 16px 36px;
    background: transparent;
    color: rgba(255,255,255,0.7);
    border: 1.5px solid rgba(255,255,255,0.2);
    border-radius: 100px;
    font-size: 14px;
    font-family: 'Georgia', serif;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s, color 0.2s;
    text-decoration: none;
    display: inline-block;
  }
  .btn-secondary:hover {
    transform: translateY(-2px);
    border-color: rgba(197,121,58,0.5);
    color: var(--terra);
  }

  /* Skip button */
  .skip {
    position: fixed;
    bottom: 28px;
    right: 28px;
    z-index: 200;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.2);
    background: none;
    border: 1px solid rgba(255,255,255,0.1);
    padding: 8px 16px;
    border-radius: 100px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }
  .skip:hover { color: rgba(255,255,255,0.5); border-color: rgba(255,255,255,0.25); }
</style>
</head>
<body>

<!-- INTRO -->
<div id="intro">
  <div class="intro-word" id="word">
    <span class="letter letter-m" id="lm">M</span>
    <span class="letter" id="l1">O</span>
    <span class="letter" id="l2">M</span>
    <span class="letter" id="l3">E</span>
    <span class="letter" id="l4">N</span>
    <span class="letter" id="l5">T</span>
    <span class="letter" id="l6">O</span>
    <div class="intro-line" id="line"></div>
  </div>
  <span class="dot" id="dot">.</span>
</div>

<!-- LANDING -->
<div id="landing">
  <canvas id="petal-canvas"></canvas>

  <div class="logo">Momento<span>.</span></div>

  <div class="hero">
    <p class="hero-eyebrow">Planifiez l'inoubliable</p>
    <h1 class="hero-title">
      Si vous voulez vivre<br>
      <em>l'expérience Momento</em><br>
      créez votre événement
    </h1>
    <p class="hero-sub">Des souvenirs qui durent une vie</p>
    <div class="btns">
      <a href="/event/new" class="btn-primary">Créer votre événement</a>
      <a href="/prestataire" class="btn-secondary">Vous êtes prestataire ?</a>
    </div>
  </div>
</div>

<button class="skip" id="skipBtn">PASSER</button>

<script>
// ─── ANIMATION SEQUENCE ───
const M  = document.getElementById('lm');
const letters = [
  document.getElementById('l1'),
  document.getElementById('l2'),
  document.getElementById('l3'),
  document.getElementById('l4'),
  document.getElementById('l5'),
  document.getElementById('l6'),
];
const line    = document.getElementById('line');
const dot     = document.getElementById('dot');
const intro   = document.getElementById('intro');
const landing = document.getElementById('landing');

function animate(el, props, duration, easing, delay = 0) {
  return new Promise(resolve => {
    setTimeout(() => {
      el.style.transition = `all ${duration}ms ${easing}`;
      Object.entries(props).forEach(([k, v]) => el.style[k] = v);
      setTimeout(resolve, duration);
    }, delay);
  });
}

function springIn(el, delay = 0) {
  return new Promise(resolve => {
    setTimeout(() => {
      // Step 1: appear compressed (instant)
      el.style.opacity = '1';
      el.style.transform = 'scaleY(0.04)';
      el.style.transition = 'none';

      requestAnimationFrame(() => requestAnimationFrame(() => {
        // Step 2: spring open
        el.style.transition = 'transform 0.55s cubic-bezier(0.34, 1.7, 0.64, 1), opacity 0.1s ease';
        el.style.transform = 'scaleY(1)';
        setTimeout(resolve, 560);
      }));
    }, delay);
  });
}

async function runIntro() {
  await new Promise(r => setTimeout(r, 300));

  // M opens like Netflix N
  await springIn(M, 0);

  // Letters fan out from center — staggered, fast
  const delays = [0, 40, 80, 120, 160, 200];
  letters.forEach((l, i) => {
    setTimeout(() => {
      l.style.opacity = '1';
      l.style.transform = 'scaleY(0.04)';
      l.style.transition = 'none';
      requestAnimationFrame(() => requestAnimationFrame(() => {
        l.style.transition = 'transform 0.45s cubic-bezier(0.34, 1.5, 0.64, 1), opacity 0.1s ease';
        l.style.transform = 'scaleY(1)';
      }));
    }, 180 + delays[i]);
  });

  await new Promise(r => setTimeout(r, 600));

  // Line appears
  line.classList.add('show');

  await new Promise(r => setTimeout(r, 200));

  // Dot pops in
  dot.style.transition = 'opacity 0.1s, transform 0.4s cubic-bezier(0.34, 2, 0.64, 1)';
  dot.style.opacity = '1';
  dot.style.transform = 'scale(1)';

  // Sheen sweep across all letters
  await new Promise(r => setTimeout(r, 300));
  const allLetters = [M, ...letters];
  allLetters.forEach((l, i) => {
    setTimeout(() => l.classList.add('sheen'), i * 45);
  });

  await new Promise(r => setTimeout(r, 800));

  // Subtle pulse on M
  M.style.transition = 'color 0.2s ease, text-shadow 0.2s ease';
  M.style.textShadow = '0 0 40px rgba(197,121,58,0.8)';
  await new Promise(r => setTimeout(r, 200));
  M.style.textShadow = '0 0 0px rgba(197,121,58,0)';

  await new Promise(r => setTimeout(r, 600));

  // Transition to landing
  transitionToLanding();
}

function transitionToLanding() {
  // Intro fades
  intro.classList.add('fade-out');
  // Landing appears
  landing.classList.add('visible');
  // After intro fades, remove it
  setTimeout(() => {
    intro.style.display = 'none';
    startPetals();
  }, 1000);
}

// Skip button
document.getElementById('skipBtn').addEventListener('click', () => {
  intro.style.display = 'none';
  landing.classList.add('visible');
  startPetals();
});

// ─── PETAL AMBIENT (same as demo3 but darker) ───
function startPetals() {
  const canvas = document.getElementById('petal-canvas');
  const ctx = canvas.getContext('2d');
  let W, H;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const COLORS = [
    'rgba(197,121,58,',
    'rgba(220,150,80,',
    'rgba(180,100,50,',
    'rgba(240,200,150,',
    'rgba(160,80,40,',
  ];

  let petals = [];

  function makePetal(x, y) {
    return {
      x: x ?? Math.random() * W,
      y: y ?? H + 20,
      vx: (Math.random() - 0.5) * 0.8,
      vy: -(0.4 + Math.random() * 1.2),
      rot: Math.random() * Math.PI * 2,
      rotV: (Math.random() - 0.5) * 0.03,
      size: 8 + Math.random() * 16,
      scaleX: 0.5 + Math.random() * 0.7,
      alpha: 0,
      maxAlpha: 0.15 + Math.random() * 0.2,
      fadeIn: 0.015,
      fadeOut: 0.003 + Math.random() * 0.003,
      phase: 'in',
      age: 0,
      driftTime: 100 + Math.random() * 150,
      wobble: Math.random() * Math.PI * 2,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
    };
  }

  for (let i = 0; i < 40; i++) {
    const p = makePetal(Math.random() * W, Math.random() * H);
    p.alpha = Math.random() * p.maxAlpha;
    p.phase = 'drift';
    p.age = Math.random() * p.driftTime;
    petals.push(p);
  }

  function drawPetal(p, now) {
    const s = p.size;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot + Math.sin(p.wobble + now * 0.001) * 0.1);
    ctx.scale(p.scaleX, 1);
    ctx.globalAlpha = p.alpha;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.bezierCurveTo(-s*0.4, -s*0.3, -s*0.2, -s*0.8, 0, -s);
    ctx.bezierCurveTo(s*0.2, -s*0.8, s*0.4, -s*0.3, 0, 0);
    const g = ctx.createLinearGradient(0, 0, 0, -s);
    g.addColorStop(0, p.color + '0.8)');
    g.addColorStop(1, p.color + '0.2)');
    ctx.fillStyle = g;
    ctx.fill();
    ctx.restore();
  }

  function loop(now) {
    ctx.clearRect(0, 0, W, H);

    petals.forEach(p => {
      p.vx += Math.sin(now * 0.0003 + p.x * 0.005) * 0.008;
      p.x += p.vx; p.y += p.vy;
      p.rot += p.rotV; p.wobble += 0.02; p.age++;
      if (p.phase === 'in') {
        p.alpha = Math.min(p.maxAlpha, p.alpha + p.fadeIn);
        if (p.alpha >= p.maxAlpha) p.phase = 'drift';
      } else if (p.phase === 'drift') {
        if (p.age > p.driftTime) p.phase = 'out';
      } else {
        p.alpha -= p.fadeOut;
      }
      if (p.y < -80 || p.alpha <= 0) Object.assign(p, makePetal());
      drawPetal(p, now);
    });

    while (petals.length < 50) petals.push(makePetal());
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
}

// ─── START ───
runIntro();
</script>
</body>
</html>
