<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo 1 — Vague Florale</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d0705;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Georgia', serif;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  canvas { position: fixed; inset: 0; z-index: 0; }

  .hero {
    position: relative;
    z-index: 10;
    text-align: center;
    pointer-events: none;
  }
  .hero-sub {
    font-size: 11px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(197,121,58,0.7);
    margin-bottom: 16px;
    opacity: 0;
    animation: fadeUp 1s 0.5s ease forwards;
  }
  .hero-title {
    font-size: clamp(48px, 8vw, 96px);
    font-weight: 300;
    color: #fff;
    letter-spacing: -0.02em;
    line-height: 1;
    opacity: 0;
    animation: fadeUp 1s 0.8s ease forwards;
  }
  .hero-title span { color: #C5793A; }
  .hero-desc {
    margin-top: 20px;
    font-size: 16px;
    color: rgba(255,255,255,0.4);
    font-style: italic;
    opacity: 0;
    animation: fadeUp 1s 1.1s ease forwards;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .nav {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    z-index: 20;
  }
  .nav a {
    padding: 8px 18px;
    border-radius: 100px;
    border: 1px solid rgba(197,121,58,0.3);
    color: rgba(255,255,255,0.5);
    text-decoration: none;
    font-size: 12px;
    letter-spacing: 0.05em;
    transition: all 0.2s;
  }
  .nav a:hover { border-color: #C5793A; color: #C5793A; }
  .nav a.active { border-color: #C5793A; color: #C5793A; background: rgba(197,121,58,0.1); }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="hero">
  <p class="hero-sub">Votre mariage de rêve</p>
  <h1 class="hero-title">Momento<span>.</span></h1>
  <p class="hero-desc">Chaque pétale, une promesse</p>
</div>

<div class="nav">
  <a class="active" href="demo1-wave.html">① Vague</a>
  <a href="demo2-explode.html">② Explosion</a>
  <a href="demo3-ambient.html">③ Ambiance</a>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, petals = [], flowers = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// --- Petal shape (SVG-like path drawn on canvas) ---
function drawPetalShape(ctx, x, y, rx, ry, angle, color, alpha) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  ctx.globalAlpha = alpha;
  ctx.beginPath();
  ctx.ellipse(0, -ry * 0.5, rx, ry, 0, 0, Math.PI * 2);
  const grad = ctx.createRadialGradient(0, -ry * 0.3, 0, 0, 0, ry);
  grad.addColorStop(0, color);
  grad.addColorStop(1, 'rgba(197,100,40,0)');
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.restore();
}

// --- Flower spawner ---
let nextFlowerTime = 0;
let waveX = -100;

function spawnFlower(x, y, delay) {
  const numPetals = 6 + Math.floor(Math.random() * 3);
  flowers.push({
    x, y, delay,
    born: Date.now(),
    numPetals,
    size: 18 + Math.random() * 20,
    color: `hsl(${20 + Math.random() * 25}, ${60 + Math.random() * 30}%, ${55 + Math.random() * 20}%)`,
    phase: 0, // 0=growing, 1=full, 2=exploding
    explodeT: 0,
    exploded: false,
  });
}

function initWave() {
  const cols = Math.ceil(W / 90) + 2;
  const rows = Math.ceil(H / 80) + 2;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const x = c * 90 + (r % 2) * 45 + Math.random() * 20 - 10;
      const y = r * 80 + Math.random() * 20 - 10;
      // delay based on x (wave travels left→right)
      const delay = (x / W) * 3000 + Math.random() * 300;
      spawnFlower(x, y, delay);
    }
  }
}
initWave();

// Spread petals when a flower explodes
function explodeFlower(f) {
  for (let i = 0; i < f.numPetals * 2; i++) {
    const angle = (Math.PI * 2 / (f.numPetals * 2)) * i + Math.random() * 0.3;
    const speed = 0.5 + Math.random() * 2.5;
    petals.push({
      x: f.x, y: f.y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1.5,
      gravity: 0.04 + Math.random() * 0.03,
      rot: Math.random() * Math.PI * 2,
      rotV: (Math.random() - 0.5) * 0.15,
      rx: (f.size * 0.25) + Math.random() * 5,
      ry: (f.size * 0.45) + Math.random() * 8,
      alpha: 0.9,
      fade: 0.006 + Math.random() * 0.006,
      color: f.color,
      wind: (Math.random() - 0.5) * 0.02,
    });
  }
}

function draw(now) {
  ctx.clearRect(0, 0, W, H);

  // Background gradient
  const bg = ctx.createRadialGradient(W*0.5, H*0.4, 0, W*0.5, H*0.5, Math.max(W,H)*0.8);
  bg.addColorStop(0, '#1a0d06');
  bg.addColorStop(1, '#080402');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Draw flowers
  flowers.forEach(f => {
    const age = now - f.born - f.delay;
    if (age < 0) return;

    const growDur = 600;
    const holdDur = 800;
    const explodeDur = 400;

    if (f.phase === 0) {
      const t = Math.min(1, age / growDur);
      const ease = 1 - Math.pow(1 - t, 3);
      const size = f.size * ease;
      // Draw petals growing
      for (let i = 0; i < f.numPetals; i++) {
        const angle = (Math.PI * 2 / f.numPetals) * i + now * 0.0001;
        drawPetalShape(ctx, f.x, f.y, size * 0.28, size * 0.55, angle, f.color, ease * 0.85);
      }
      // Center
      ctx.save();
      ctx.globalAlpha = ease * 0.9;
      const cg = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, size * 0.18);
      cg.addColorStop(0, '#fff5e0');
      cg.addColorStop(1, '#C5793A');
      ctx.beginPath();
      ctx.arc(f.x, f.y, size * 0.18, 0, Math.PI * 2);
      ctx.fillStyle = cg;
      ctx.fill();
      ctx.restore();

      if (t >= 1) f.phase = 1;
    } else if (f.phase === 1) {
      const t2 = age - growDur;
      // Draw full flower
      for (let i = 0; i < f.numPetals; i++) {
        const a = (Math.PI * 2 / f.numPetals) * i + Math.sin(now * 0.001 + i) * 0.04;
        drawPetalShape(ctx, f.x, f.y, f.size * 0.28, f.size * 0.55, a, f.color, 0.85);
      }
      ctx.save();
      ctx.globalAlpha = 0.9;
      const cg = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, f.size * 0.18);
      cg.addColorStop(0, '#fff5e0');
      cg.addColorStop(1, '#C5793A');
      ctx.beginPath();
      ctx.arc(f.x, f.y, f.size * 0.18, 0, Math.PI * 2);
      ctx.fillStyle = cg;
      ctx.fill();
      ctx.restore();

      if (t2 >= holdDur && !f.exploded) {
        f.exploded = true;
        explodeFlower(f);
        f.phase = 2;
        f.explodeStart = now;
      }
    } else if (f.phase === 2) {
      const t3 = Math.min(1, (now - f.explodeStart) / explodeDur);
      // Petals fly apart — drawn by petals array
      // Stamen shrinks
      ctx.save();
      ctx.globalAlpha = (1 - t3) * 0.6;
      ctx.beginPath();
      ctx.arc(f.x, f.y, f.size * 0.12 * (1 - t3), 0, Math.PI * 2);
      ctx.fillStyle = '#fff5e0';
      ctx.fill();
      ctx.restore();

      // After explode, respawn after delay
      if (t3 >= 1) {
        f.born = now + 4000 + Math.random() * 3000;
        f.phase = 0;
        f.exploded = false;
      }
    }
  });

  // Draw flying petals
  petals = petals.filter(p => p.alpha > 0.01);
  petals.forEach(p => {
    drawPetalShape(ctx, p.x, p.y, p.rx, p.ry, p.rot, p.color, p.alpha);
    p.x += p.vx;
    p.y += p.vy;
    p.vy += p.gravity;
    p.vx += p.wind;
    p.rot += p.rotV;
    p.alpha -= p.fade;
  });

  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);
</script>
</body>
</html>
