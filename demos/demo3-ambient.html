<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo 3 — Ambiance Pétales</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Georgia', serif;
    background: #f5f0eb;
  }
  canvas { position: fixed; inset: 0; z-index: 0; }

  .hero {
    position: relative;
    z-index: 10;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    pointer-events: none;
  }
  .hero-sub {
    font-size: 11px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(120,70,30,0.55);
    margin-bottom: 16px;
    opacity: 0;
    animation: fadeUp 1.2s 0.6s ease forwards;
  }
  .hero-title {
    font-size: clamp(52px, 9vw, 108px);
    font-weight: 300;
    color: #2a1a0e;
    letter-spacing: -0.03em;
    line-height: 1;
    opacity: 0;
    animation: fadeUp 1.2s 0.9s ease forwards;
  }
  .hero-title span { color: #C5793A; }
  .hero-desc {
    margin-top: 22px;
    font-size: 16px;
    color: rgba(80,50,25,0.5);
    font-style: italic;
    opacity: 0;
    animation: fadeUp 1.2s 1.2s ease forwards;
  }
  .cta {
    pointer-events: auto;
    margin-top: 36px;
    padding: 14px 36px;
    background: #C5793A;
    color: #fff;
    border: none;
    border-radius: 100px;
    font-size: 14px;
    letter-spacing: 0.08em;
    cursor: pointer;
    opacity: 0;
    animation: fadeUp 1.2s 1.5s ease forwards;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 8px 32px rgba(197,121,58,0.3);
  }
  .cta:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(197,121,58,0.45); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .nav {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    z-index: 20;
  }
  .nav a {
    padding: 8px 18px;
    border-radius: 100px;
    border: 1px solid rgba(120,70,30,0.25);
    color: rgba(80,50,25,0.6);
    text-decoration: none;
    font-size: 12px;
    letter-spacing: 0.05em;
    transition: all 0.2s;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(8px);
  }
  .nav a:hover { border-color: #C5793A; color: #C5793A; }
  .nav a.active { border-color: #C5793A; color: #C5793A; background: rgba(197,121,58,0.08); }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="hero">
  <p class="hero-sub">Votre mariage de rêve</p>
  <h1 class="hero-title">Momento<span>.</span></h1>
  <p class="hero-desc">Chaque pétale, une promesse</p>
  <button class="cta">Commencer l'aventure</button>
</div>

<div class="nav">
  <a href="demo1-wave.html">① Vague</a>
  <a href="demo2-explode.html">② Explosion</a>
  <a class="active" href="demo3-ambient.html">③ Ambiance</a>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  spawnInitialPetals();
}

// Color palette — light, warm
const COLORS = [
  'rgba(220,130,100,',  // terracotta
  'rgba(245,190,160,',  // peach
  'rgba(210,100,120,',  // rose
  'rgba(245,210,180,',  // cream rose
  'rgba(190,150,220,',  // lavande
  'rgba(255,220,200,',  // pale peach
];

let petals = [];
let bloomSources = [];

// A petal has: position, velocity, rotation, scale, opacity, shape params
function makePetal(x, y, vx, vy) {
  const colorBase = COLORS[Math.floor(Math.random() * COLORS.length)];
  return {
    x, y,
    vx: vx ?? (Math.random() - 0.5) * 1.5,
    vy: vy ?? -(1 + Math.random() * 2),
    rot: Math.random() * Math.PI * 2,
    rotV: (Math.random() - 0.5) * 0.04,
    scaleX: 0.6 + Math.random() * 0.8,
    scaleY: 0.8 + Math.random() * 1,
    alpha: 0,
    fadeIn: 0.02 + Math.random() * 0.02,
    fadeOut: 0.003 + Math.random() * 0.003,
    maxAlpha: 0.5 + Math.random() * 0.4,
    phase: 'in', // 'in' | 'drift' | 'out'
    driftTime: 80 + Math.random() * 160,
    age: 0,
    wind: 0,
    wobble: Math.random() * Math.PI * 2,
    wobbleSpeed: 0.02 + Math.random() * 0.02,
    colorBase,
    size: 12 + Math.random() * 20,
  };
}

function spawnInitialPetals() {
  petals = [];
  for (let i = 0; i < 60; i++) {
    const p = makePetal(Math.random() * W, Math.random() * H * 1.2);
    p.alpha = Math.random() * p.maxAlpha;
    p.phase = Math.random() > 0.5 ? 'drift' : 'out';
    p.age = Math.random() * p.driftTime;
    petals.push(p);
  }
}

// Bloom sources — flowers that periodically spawn petals
function spawnBloomSource() {
  bloomSources.push({
    x: Math.random() * W,
    y: H * (0.3 + Math.random() * 0.5),
    interval: 8 + Math.random() * 12,
    tick: 0,
    petalsLeft: 20 + Math.floor(Math.random() * 30),
  });
}

// Draw a single petal (bezier shape)
function drawPetal(p, now) {
  const s = p.size;
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(p.rot + Math.sin(p.wobble + now * p.wobbleSpeed) * 0.12);
  ctx.scale(p.scaleX, p.scaleY);
  ctx.globalAlpha = p.alpha;

  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo(-s * 0.4, -s * 0.3, -s * 0.25, -s * 0.85, 0, -s);
  ctx.bezierCurveTo(s * 0.25, -s * 0.85, s * 0.4, -s * 0.3, 0, 0);

  // Inner vein
  const g = ctx.createLinearGradient(0, 0, 0, -s);
  g.addColorStop(0, p.colorBase + '0.9)');
  g.addColorStop(0.4, p.colorBase + '0.7)');
  g.addColorStop(1, 'rgba(255,255,255,0.6)');
  ctx.fillStyle = g;
  ctx.fill();

  // Vein line
  ctx.beginPath();
  ctx.moveTo(0, -s * 0.1);
  ctx.lineTo(0, -s * 0.85);
  ctx.strokeStyle = p.colorBase + '0.2)';
  ctx.lineWidth = 0.5;
  ctx.stroke();

  ctx.restore();
}

// Full flower bloom at position
function bloomFlower(x, y, now) {
  const numPetals = 5 + Math.floor(Math.random() * 4);
  const color = COLORS[Math.floor(Math.random() * COLORS.length)];
  for (let i = 0; i < numPetals; i++) {
    const a = (Math.PI * 2 / numPetals) * i + (Math.random() - 0.5) * 0.5;
    const speed = 0.8 + Math.random() * 1.5;
    const p = makePetal(x, y, Math.cos(a) * speed, Math.sin(a) * speed - 1.2);
    p.colorBase = color;
    p.size = 14 + Math.random() * 18;
    petals.push(p);
  }
}

let lastBloom = 0;
let bloomInterval = 1200;

function update(now) {
  // Spawn bloom sources
  if (bloomSources.length < 6) spawnBloomSource();

  // Bloom sources emit petals
  bloomSources.forEach((bs, i) => {
    bs.tick++;
    if (bs.tick >= bs.interval && bs.petalsLeft > 0) {
      bs.tick = 0;
      const p = makePetal(
        bs.x + (Math.random() - 0.5) * 60,
        bs.y,
        (Math.random() - 0.5) * 1.2,
        -(0.8 + Math.random() * 1.8)
      );
      petals.push(p);
      bs.petalsLeft--;
    }
    if (bs.petalsLeft <= 0) {
      // Respawn after delay
      if (bs.tick > 200) {
        bloomSources.splice(i, 1);
        spawnBloomSource();
      }
    }
  });

  // Periodic flower blooms
  if (now - lastBloom > bloomInterval) {
    lastBloom = now;
    bloomInterval = 1500 + Math.random() * 2000;
    bloomFlower(
      W * 0.1 + Math.random() * W * 0.8,
      H * 0.3 + Math.random() * H * 0.5,
      now
    );
  }

  // Update petals
  petals = petals.filter(p => p.alpha > 0 || p.phase === 'in');
  petals.forEach(p => {
    const windWave = Math.sin(now * 0.0005 + p.x * 0.01) * 0.015;
    p.vx += windWave;
    p.vy *= 0.99;
    p.vx *= 0.995;
    p.x += p.vx;
    p.y += p.vy;
    p.rot += p.rotV;
    p.wobble += p.wobbleSpeed;
    p.age++;

    if (p.phase === 'in') {
      p.alpha = Math.min(p.maxAlpha, p.alpha + p.fadeIn);
      if (p.alpha >= p.maxAlpha) p.phase = 'drift';
    } else if (p.phase === 'drift') {
      if (p.age >= p.driftTime) p.phase = 'out';
    } else {
      p.alpha = Math.max(0, p.alpha - p.fadeOut);
    }

    // Off screen → remove
    if (p.y < -100 || p.y > H + 100 || p.x < -150 || p.x > W + 150) {
      p.alpha = 0;
    }
  });

  // Maintain petal count
  while (petals.length < 80) {
    const side = Math.random();
    let x, y, vx, vy;
    if (side < 0.6) {
      x = Math.random() * W;
      y = H + 20;
      vx = (Math.random() - 0.5) * 0.8;
      vy = -(0.5 + Math.random() * 1.5);
    } else {
      x = side < 0.8 ? -20 : W + 20;
      y = Math.random() * H;
      vx = (side < 0.8 ? 1 : -1) * (0.3 + Math.random() * 0.8);
      vy = -(0.3 + Math.random());
    }
    petals.push(makePetal(x, y, vx, vy));
  }
}

function drawBackground(now) {
  // Light gradient — parchment to white
  const bg = ctx.createLinearGradient(0, 0, W * 0.3, H);
  bg.addColorStop(0, '#fdf7f2');
  bg.addColorStop(0.5, '#f8efe8');
  bg.addColorStop(1, '#f2e8df');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Subtle texture overlay
  ctx.fillStyle = 'rgba(197,121,58,0.02)';
  for (let i = 0; i < 5; i++) {
    ctx.beginPath();
    ctx.ellipse(
      W * (0.1 + i * 0.22),
      H * (0.2 + Math.sin(now * 0.0002 + i) * 0.1),
      W * 0.25,
      H * 0.5,
      0, 0, Math.PI * 2
    );
    ctx.fill();
  }
}

function loop(now) {
  ctx.clearRect(0, 0, W, H);
  drawBackground(now);
  update(now);
  petals.forEach(p => drawPetal(p, now));
  requestAnimationFrame(loop);
}

window.addEventListener('resize', resize);
resize();
requestAnimationFrame(loop);

// Click to bloom
canvas.addEventListener('click', e => {
  bloomFlower(e.clientX, e.clientY);
  // Mini ripple
  const ripple = { x: e.clientX, y: e.clientY, r: 0, alpha: 0.6 };
  const rippleAnim = () => {
    ripple.r += 4;
    ripple.alpha -= 0.03;
    if (ripple.alpha > 0) {
      ctx.save();
      ctx.globalAlpha = ripple.alpha;
      ctx.strokeStyle = '#C5793A';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(ripple.x, ripple.y, ripple.r, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
      requestAnimationFrame(rippleAnim);
    }
  };
  rippleAnim();
});
</script>
</body>
</html>
