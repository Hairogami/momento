<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo 2 — Explosion Radiale</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #05080d;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Georgia', serif;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: crosshair;
  }
  canvas { position: fixed; inset: 0; z-index: 0; }
  .hero {
    position: relative;
    z-index: 10;
    text-align: center;
    pointer-events: none;
    user-select: none;
  }
  .hero-sub {
    font-size: 11px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(180,140,255,0.6);
    margin-bottom: 16px;
    opacity: 0;
    animation: fadeUp 1s 0.4s ease forwards;
  }
  .hero-title {
    font-size: clamp(48px, 8vw, 96px);
    font-weight: 300;
    color: #fff;
    letter-spacing: -0.02em;
    line-height: 1;
    opacity: 0;
    animation: fadeUp 1s 0.7s ease forwards;
  }
  .hero-title span { color: #b48cff; }
  .hero-desc {
    margin-top: 20px;
    font-size: 15px;
    color: rgba(255,255,255,0.35);
    font-style: italic;
    opacity: 0;
    animation: fadeUp 1s 1s ease forwards;
  }
  .hint {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.2);
    z-index: 20;
    pointer-events: none;
    animation: pulse 3s ease infinite;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 0.5; }
  }
  .nav {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    z-index: 20;
  }
  .nav a {
    padding: 8px 18px;
    border-radius: 100px;
    border: 1px solid rgba(180,140,255,0.3);
    color: rgba(255,255,255,0.5);
    text-decoration: none;
    font-size: 12px;
    letter-spacing: 0.05em;
    transition: all 0.2s;
  }
  .nav a:hover { border-color: #b48cff; color: #b48cff; }
  .nav a.active { border-color: #b48cff; color: #b48cff; background: rgba(180,140,255,0.1); }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="hero">
  <p class="hero-sub">Votre mariage de rêve</p>
  <h1 class="hero-title">Momento<span>.</span></h1>
  <p class="hero-desc">Chaque pétale, une promesse</p>
</div>

<p class="hint">CLIQUEZ N'IMPORTE OÙ</p>

<div class="nav">
  <a href="demo1-wave.html">① Vague</a>
  <a class="active" href="demo2-explode.html">② Explosion</a>
  <a href="demo3-ambient.html">③ Ambiance</a>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Explosion registry
let explosions = [];
let time = 0;

// Petal shape
function petalPath(ctx, cx, cy, len, width, angle) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo(-width, -len * 0.3, -width * 0.5, -len * 0.7, 0, -len);
  ctx.bezierCurveTo(width * 0.5, -len * 0.7, width, -len * 0.3, 0, 0);
  ctx.restore();
}

const PALETTES = [
  ['#f5c6ea','#e879c0','#c548a0','#8b1a6b'],   // rose magenta
  ['#ffd6a5','#ffb347','#C5793A','#8b4513'],   // terra orange
  ['#c7f0d8','#7ed9a4','#40b068','#1a5c30'],   // vert forêt
  ['#d4b8ff','#b48cff','#8857ff','#4a1fa0'],   // violet
  ['#ffe4b5','#ffd700','#daa520','#8b6914'],   // or
];

function randomPalette() {
  return PALETTES[Math.floor(Math.random() * PALETTES.length)];
}

class Explosion {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.born = time;
    this.palette = randomPalette();
    this.rings = [];
    this.petals = [];

    // Create rings of petals that expand
    const numRings = 4;
    for (let r = 0; r < numRings; r++) {
      const numP = 8 + r * 4;
      const delay = r * 80;
      const speed = 2.5 + r * 0.8;
      for (let i = 0; i < numP; i++) {
        const baseAngle = (Math.PI * 2 / numP) * i;
        const angleJitter = (Math.random() - 0.5) * 0.3;
        this.petals.push({
          angle: baseAngle + angleJitter,
          delay,
          speed: speed * (0.7 + Math.random() * 0.6),
          len: 10 + r * 5 + Math.random() * 8,
          width: 3 + r * 2 + Math.random() * 3,
          color: this.palette[Math.min(r, this.palette.length - 1)],
          rotOffset: (Math.random() - 0.5) * 0.5,
          gravity: 0.04 + Math.random() * 0.03,
          vy: 0,
          x: 0, y: 0,
          alpha: 1,
          started: false,
        });
      }
    }

    // Central flash
    this.flashAlpha = 1;
    this.flashSize = 0;
  }

  draw(now) {
    const age = now - this.born;

    // Flash
    if (age < 300) {
      const t = age / 300;
      ctx.save();
      ctx.globalAlpha = (1 - t) * 0.8;
      const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, 60 * t);
      g.addColorStop(0, '#ffffff');
      g.addColorStop(0.3, this.palette[1]);
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(this.x, this.y, 60 * t, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // Shockwave ring
    if (age < 600) {
      const t = age / 600;
      ctx.save();
      ctx.globalAlpha = (1 - t) * 0.4;
      ctx.strokeStyle = this.palette[0];
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(this.x, this.y, 80 * t * (1 + t * 0.5), 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    // Petals
    this.petals.forEach(p => {
      const pa = age - p.delay;
      if (pa < 0) return;

      const vx = Math.cos(p.angle) * p.speed;
      const vy_init = Math.sin(p.angle) * p.speed;
      const t = pa / 1000;

      const px = this.x + vx * pa * 0.06;
      const py = this.y + vy_init * pa * 0.06 + 0.5 * p.gravity * t * t * 1000;

      // Fade out
      const totalLife = 1800 + p.delay;
      const alpha = Math.max(0, 1 - (age - p.delay) / (totalLife - p.delay));

      ctx.save();
      ctx.translate(px, py);
      ctx.rotate(p.angle + Math.PI / 2 + p.rotOffset + t * 2);
      ctx.globalAlpha = alpha * 0.9;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.bezierCurveTo(-p.width, -p.len * 0.3, -p.width * 0.5, -p.len * 0.7, 0, -p.len);
      ctx.bezierCurveTo(p.width * 0.5, -p.len * 0.7, p.width, -p.len * 0.3, 0, 0);

      const grd = ctx.createLinearGradient(0, 0, 0, -p.len);
      grd.addColorStop(0, p.color + 'cc');
      grd.addColorStop(0.5, p.color);
      grd.addColorStop(1, '#ffffff88');
      ctx.fillStyle = grd;
      ctx.fill();
      ctx.restore();
    });

    // Done?
    return age < 2500;
  }
}

// Auto-spawn a few on load
function autoSpawn() {
  const cx = W * 0.5, cy = H * 0.5;
  explosions.push(new Explosion(cx, cy));
  setTimeout(() => explosions.push(new Explosion(cx * 0.3, cy * 0.7)), 400);
  setTimeout(() => explosions.push(new Explosion(cx * 1.7, cy * 0.4)), 700);
}

// Background stars/dust
const dust = Array.from({ length: 80 }, () => ({
  x: Math.random(), y: Math.random(),
  r: 0.5 + Math.random() * 1.5,
  alpha: 0.1 + Math.random() * 0.3,
  twinkle: Math.random() * Math.PI * 2,
}));

function drawBackground(now) {
  const bg = ctx.createRadialGradient(W*0.5, H*0.4, 0, W*0.5, H*0.6, Math.max(W,H)*0.8);
  bg.addColorStop(0, '#0d0a18');
  bg.addColorStop(1, '#030206');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  dust.forEach(d => {
    const t = now * 0.001 + d.twinkle;
    ctx.save();
    ctx.globalAlpha = d.alpha * (0.5 + 0.5 * Math.sin(t));
    ctx.beginPath();
    ctx.arc(d.x * W, d.y * H, d.r, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.restore();
  });
}

let started = false;
function loop(now) {
  time = now;
  ctx.clearRect(0, 0, W, H);
  drawBackground(now);

  if (!started && now > 300) {
    started = true;
    autoSpawn();
  }

  explosions = explosions.filter(e => e.draw(now));
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// Click to explode
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  explosions.push(new Explosion(e.clientX - rect.left, e.clientY - rect.top));
});
document.querySelector('.hero').addEventListener('click', e => {
  explosions.push(new Explosion(e.clientX, e.clientY));
});
</script>
</body>
</html>
