<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intro B — Ruban 3D</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --terra: #C5793A; }

  body { background: #040302; min-height: 100vh; overflow: hidden; font-family: 'Georgia', serif; }

  /* ─── INTRO ─── */
  #intro {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    background: #040302;
    transition: opacity 1.1s ease;
  }
  #intro.out { opacity: 0; pointer-events: none; }

  /* 3D scene */
  .scene {
    perspective: 900px;
    perspective-origin: 50% 50%;
  }

  /* The ribbon — lies flat (rotateX 88deg = nearly horizontal, edge-on) then flips to face viewer */
  .ribbon {
    position: relative;
    transform-style: preserve-3d;
    transform: rotateX(88deg);
    /* Will animate to rotateX(0deg) */
  }

  .ribbon-face {
    position: relative;
    padding: 28px 52px 24px;
    overflow: hidden;
    /* Terra gradient as ribbon background */
    background: linear-gradient(
      160deg,
      #1a0d05 0%,
      #2d1508 30%,
      #3d1e0a 50%,
      #2d1508 70%,
      #1a0d05 100%
    );
    border-top: 1px solid rgba(197,121,58,0.25);
    border-bottom: 1px solid rgba(197,121,58,0.25);
  }

  /* The text on the ribbon face */
  .ribbon-text {
    font-size: clamp(64px, 10.5vw, 126px);
    font-weight: 300;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #fff;
    display: block;
    white-space: nowrap;
    position: relative;
    z-index: 2;
    /* Text will be revealed via clip-path */
    clip-path: inset(0 100% 0 0);
  }

  /* Terra tint overlay on ribbon */
  .ribbon-tint {
    position: absolute;
    inset: 0;
    background: linear-gradient(to right, rgba(197,121,58,0.12), transparent 40%, rgba(197,121,58,0.08));
    z-index: 1;
    pointer-events: none;
  }

  /* Light reflection — sweeps during flip */
  .ribbon-reflex {
    position: absolute;
    inset: -10px;
    background: linear-gradient(
      105deg,
      transparent 0%,
      transparent 30%,
      rgba(255,240,220,0.0) 40%,
      rgba(255,240,220,0.7) 48%,
      rgba(255,255,255,0.9) 50%,
      rgba(255,240,220,0.7) 52%,
      rgba(255,240,220,0.0) 60%,
      transparent 70%,
      transparent 100%
    );
    transform: translateX(-130%);
    z-index: 3;
    pointer-events: none;
  }

  /* Edge glow — bottom of ribbon */
  .ribbon-edge {
    height: 2px;
    background: linear-gradient(to right, transparent 5%, var(--terra) 30%, rgba(255,200,120,0.8) 50%, var(--terra) 70%, transparent 95%);
    transform: scaleX(0);
    transform-origin: center;
  }

  /* ─── LANDING ─── */
  #landing {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #040302;
    opacity: 0; pointer-events: none;
    transition: opacity 0.9s ease;
  }
  #landing.in { opacity: 1; pointer-events: auto; }

  canvas { position: absolute; inset: 0; z-index: 0; opacity: 0; transition: opacity 2.5s ease 0.5s; }
  #landing.in canvas { opacity: 1; }

  .logo { position: absolute; top: 28px; left: 36px; font-size: 17px; font-weight: 400; color: #fff; letter-spacing: 0.14em; text-transform: uppercase; z-index: 10; opacity: 0; transition: opacity 0.6s ease 0.7s; }
  .logo span { color: var(--terra); }
  #landing.in .logo { opacity: 1; }

  .hero { position: relative; z-index: 10; text-align: center; max-width: 620px; padding: 0 24px; }
  .eyebrow { font-size: 10px; letter-spacing: 0.42em; text-transform: uppercase; color: rgba(197,121,58,0.6); margin-bottom: 22px; opacity: 0; transition: opacity 0.8s ease 0.4s, transform 0.8s ease 0.4s; transform: translateY(14px); }
  #landing.in .eyebrow { opacity: 1; transform: none; }
  .title { font-size: clamp(28px, 4vw, 48px); font-weight: 300; color: #fff; line-height: 1.35; letter-spacing: -0.01em; opacity: 0; transition: opacity 0.9s ease 0.65s, transform 0.9s ease 0.65s; transform: translateY(18px); }
  .title em { color: var(--terra); font-style: normal; }
  #landing.in .title { opacity: 1; transform: none; }
  .btns { margin-top: 40px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; opacity: 0; transition: opacity 0.7s ease 1.1s, transform 0.7s ease 1.1s; transform: translateY(12px); }
  #landing.in .btns { opacity: 1; transform: none; }
  .bp { padding: 15px 34px; background: var(--terra); color: #fff; border: none; border-radius: 100px; font-size: 13px; font-family: Georgia, serif; letter-spacing: 0.07em; cursor: pointer; box-shadow: 0 8px 28px rgba(197,121,58,0.3); transition: transform 0.2s, box-shadow 0.2s; }
  .bp:hover { transform: translateY(-2px); box-shadow: 0 12px 36px rgba(197,121,58,0.45); }
  .bs { padding: 15px 34px; background: transparent; color: rgba(255,255,255,0.6); border: 1.5px solid rgba(255,255,255,0.16); border-radius: 100px; font-size: 13px; font-family: Georgia, serif; letter-spacing: 0.07em; cursor: pointer; transition: transform 0.2s, border-color 0.2s, color 0.2s; }
  .bs:hover { transform: translateY(-2px); border-color: rgba(197,121,58,0.4); color: var(--terra); }

  .switch { position: fixed; bottom: 24px; right: 24px; z-index: 200; font-size: 11px; letter-spacing: 0.15em; color: rgba(255,255,255,0.2); background: none; border: 1px solid rgba(255,255,255,0.1); padding: 7px 14px; border-radius: 100px; cursor: pointer; transition: color 0.2s, border-color 0.2s; font-family: Georgia, serif; }
  .switch:hover { color: rgba(255,255,255,0.5); border-color: rgba(255,255,255,0.25); }
  .label { position: fixed; top: 20px; right: 24px; font-size: 10px; letter-spacing: 0.2em; color: rgba(255,255,255,0.15); text-transform: uppercase; z-index: 200; }
</style>
</head>
<body>

<div id="intro">
  <div class="scene">
    <div class="ribbon" id="ribbon">
      <div class="ribbon-face" id="rface">
        <div class="ribbon-tint"></div>
        <span class="ribbon-text" id="rtext">MOMENTO</span>
        <div class="ribbon-reflex" id="reflex"></div>
      </div>
      <div class="ribbon-edge" id="redge"></div>
    </div>
  </div>
</div>

<div id="landing">
  <canvas id="c"></canvas>
  <div class="logo">Momento<span>.</span></div>
  <div class="hero">
    <p class="eyebrow">Planifiez l'inoubliable</p>
    <h1 class="title">Si vous voulez vivre<br><em>l'expérience Momento</em><br>créez votre événement</h1>
    <div class="btns">
      <button class="bp">Créer votre événement</button>
      <button class="bs">Vous êtes prestataire ?</button>
    </div>
  </div>
</div>

<p class="label">Version B — Ruban 3D</p>
<button class="switch" onclick="location.href='intro-a.html'">← Version A</button>

<script>
const ribbon = document.getElementById('ribbon');
const rtext  = document.getElementById('rtext');
const reflex = document.getElementById('reflex');
const redge  = document.getElementById('redge');
const intro  = document.getElementById('intro');
const landing= document.getElementById('landing');

async function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

async function run() {
  await wait(500);

  // Phase 1 — Ribbon flips from horizontal to facing viewer
  // Slow cinematic flip: 88deg → 0deg over 1.4s with slight overshoot
  ribbon.style.transition = 'transform 1.4s cubic-bezier(0.25, 0.1, 0.25, 1)';
  ribbon.style.transform = 'rotateX(0deg)';

  // Phase 2 — Text reveals by clip-path as ribbon opens (sync'd)
  await wait(300);
  rtext.style.transition = 'clip-path 0.9s cubic-bezier(0.4, 0, 0.2, 1)';
  rtext.style.clipPath = 'inset(0 0% 0 0)';

  // Edge glow draws
  await wait(200);
  redge.style.transition = 'transform 0.7s cubic-bezier(0.34, 1.2, 0.64, 1)';
  redge.style.transform = 'scaleX(1)';

  // Phase 3 — Light reflex sweeps after flip completes
  await wait(700);
  reflex.style.transition = 'transform 0.6s cubic-bezier(0.4, 0, 0.6, 1)';
  reflex.style.transform = 'translateX(130%)';

  // Phase 4 — Hold
  await wait(900);

  // Phase 5 — Slight scale pulse then exit
  ribbon.style.transition = 'transform 0.25s ease';
  ribbon.style.transform = 'rotateX(0deg) scale(1.015)';
  await wait(250);
  ribbon.style.transition = 'transform 0.25s ease';
  ribbon.style.transform = 'rotateX(0deg) scale(1)';

  await wait(400);

  // Phase 6 — Fade out intro, reveal landing
  intro.classList.add('out');
  await wait(200);
  landing.classList.add('in');
  await wait(800);
  intro.style.display = 'none';
  startPetals();
}

run();

// ─── petals ───
function startPetals() {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let W, H;
  const resize = () => { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; };
  resize(); window.addEventListener('resize', resize);
  const C = ['rgba(197,121,58,','rgba(160,85,35,','rgba(220,150,70,','rgba(240,185,110,'];
  let petals = [];
  const mp = () => ({ x:Math.random()*W, y:H+10, vx:(Math.random()-.5)*.7, vy:-(0.35+Math.random()*1.1), rot:Math.random()*Math.PI*2, rotV:(Math.random()-.5)*.03, s:7+Math.random()*13, sx:0.5+Math.random()*.7, a:0, ma:0.1+Math.random()*.15, fi:0.01, fo:0.0025+Math.random()*.003, ph:'in', age:0, dt:120+Math.random()*160, w:Math.random()*Math.PI*2, c:C[Math.floor(Math.random()*C.length)] });
  for(let i=0;i<30;i++){const p=mp();p.y=Math.random()*H;p.a=Math.random()*p.ma;p.ph='drift';petals.push(p);}
  const dp=(p,now)=>{const s=p.s;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot+Math.sin(p.w+now*.001)*.1);ctx.scale(p.sx,1);ctx.globalAlpha=p.a;ctx.beginPath();ctx.moveTo(0,0);ctx.bezierCurveTo(-s*.4,-s*.3,-s*.2,-s*.8,0,-s);ctx.bezierCurveTo(s*.2,-s*.8,s*.4,-s*.3,0,0);const g=ctx.createLinearGradient(0,0,0,-s);g.addColorStop(0,p.c+'0.8)');g.addColorStop(1,p.c+'0.1)');ctx.fillStyle=g;ctx.fill();ctx.restore();};
  const loop=(now)=>{ctx.clearRect(0,0,W,H);petals.forEach(p=>{p.vx+=Math.sin(now*.0003+p.x*.005)*.006;p.x+=p.vx;p.y+=p.vy;p.rot+=p.rotV;p.w+=.018;p.age++;if(p.ph==='in'){p.a=Math.min(p.ma,p.a+p.fi);if(p.a>=p.ma)p.ph='drift';}else if(p.ph==='drift'){if(p.age>p.dt)p.ph='out';}else p.a-=p.fo;if(p.y<-60||p.a<=0)Object.assign(p,mp());dp(p,now);});while(petals.length<42)petals.push(mp());requestAnimationFrame(loop);};
  requestAnimationFrame(loop);
}
</script>
</body>
</html>
